version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Supply chain defense: time-based isolation (cooldown). Hold back action
    # version updates published within the last 7 days so a compromised release
    # is likely detected and yanked before Dependabot proposes it. Security
    # update PRs bypass cooldown and still need manual age/provenance review.
    # Mirrors the 7-day cooldown in ~/.npmrc and ~/.bunfig.toml.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "ci"
