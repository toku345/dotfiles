name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  shellcheck:
    name: ShellCheck Lint
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run ShellCheck on shell scripts
        run: |
          echo "=== ShellCheck Analysis ==="

          FAILED=0
          FOUND=0

          # Use process substitution to avoid word splitting on filenames
          while IFS= read -r script; do
            [ -z "$script" ] && continue
            FOUND=1
            echo ""
            echo "Checking: $script"

            if echo "$script" | grep -q '\.tmpl$'; then
              # Strip Go template syntax before checking
              # Replace {{ ... }} with PLACEHOLDER to avoid parse errors
              sed 's/{{[^}]*}}/PLACEHOLDER/g' "$script" | \
                shellcheck --severity=warning - || FAILED=1
            else
              shellcheck --severity=warning "$script" || FAILED=1
            fi
          done < <(find .chezmoiscripts dot_local/bin tests/bats/bin \
              -type f \( -name "*.sh" -o -name "*.sh.tmpl" -o -name "executable_*" -o -name "fzf" -o -name "ghostty" \) \
              2>/dev/null)

          if [ $FOUND -eq 0 ]; then
            echo "No shell scripts found"
            exit 0
          fi

          echo ""
          if [ $FAILED -eq 1 ]; then
            echo "ERROR: ShellCheck found issues in one or more scripts"
            exit 1
          fi

          echo "OK: All scripts passed ShellCheck"

  chezmoi-validate:
    name: Chezmoi Validation
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install chezmoi
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin
          echo "Installed chezmoi version:"
          chezmoi --version

      - name: Validate template syntax
        run: |
          echo "=== Template Syntax Validation ==="

          FAILED=0
          FOUND=0

          # Use process substitution to avoid word splitting on filenames
          while IFS= read -r tmpl; do
            [ -z "$tmpl" ] && continue
            FOUND=1
            echo "Validating: $tmpl"

            # .chezmoi.toml.tmpl uses init-time functions (promptBoolOnce etc.)
            # that require --init flag to be available in execute-template
            if [ "$(basename "$tmpl")" = ".chezmoi.toml.tmpl" ]; then
              EXEC_ARGS="--init"
            else
              EXEC_ARGS=""
            fi

            if ! chezmoi execute-template $EXEC_ARGS --file "$tmpl" > /dev/null 2>&1; then
              echo "ERROR: Invalid template syntax in $tmpl"
              chezmoi execute-template $EXEC_ARGS --file "$tmpl" 2>&1 || true
              FAILED=1
            fi
          done < <(find . -name "*.tmpl" -type f 2>/dev/null)

          if [ $FOUND -eq 0 ]; then
            echo "No template files found"
            exit 0
          fi

          echo ""
          if [ $FAILED -eq 1 ]; then
            echo "ERROR: Template validation failed"
            exit 1
          fi

          echo "OK: All templates have valid syntax"

      - name: Run chezmoi doctor
        run: |
          echo "=== Chezmoi Doctor ==="
          chezmoi doctor --no-network || true

      - name: Verify chezmoi configuration
        run: |
          echo "=== Chezmoi Configuration Check ==="

          # Check that managed files can be listed (excluding encrypted)
          echo "Managed files (excluding encrypted):"
          chezmoi managed --include=files --exclude=encrypted 2>/dev/null || true

          echo ""
          echo "OK: Configuration appears valid"

  fish-syntax:
    name: Fish Syntax Check
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install fish shell
        run: |
          sudo apt-get update
          sudo apt-get install -y fish
          fish --version

      - name: Fish syntax check
        run: |
          echo "=== Fish Syntax Check ==="
          FAILED=0

          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "Checking: $f"
            fish -n "$f" || FAILED=1
          done < <(find private_dot_config/private_fish \
              -type f -name "*.fish" 2>/dev/null)

          if [ $FAILED -eq 1 ]; then
            echo "ERROR: fish syntax check failed"
            exit 1
          fi
          echo "OK: fish syntax check passed"

  bats-tests:
    name: Bats Tests
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install bats-core
        run: |
          sudo apt-get update
          sudo apt-get install -y bats
          bats --version

      - name: Run bats test suite
        run: bats tests/bats/

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [shellcheck, chezmoi-validate, fish-syntax, bats-tests]
    if: always()

    permissions: {}

    steps:
      - name: Check results
        env:
          RESULT_SHELLCHECK: ${{ needs.shellcheck.result }}
          RESULT_CHEZMOI: ${{ needs.chezmoi-validate.result }}
          RESULT_FISH: ${{ needs.fish-syntax.result }}
          RESULT_BATS: ${{ needs.bats-tests.result }}
        run: |
          echo "=== CI Results ==="
          echo "ShellCheck: $RESULT_SHELLCHECK"
          echo "Chezmoi Validation: $RESULT_CHEZMOI"
          echo "Fish Syntax: $RESULT_FISH"
          echo "Bats Tests: $RESULT_BATS"

          if [ "$RESULT_SHELLCHECK" != "success" ] || \
             [ "$RESULT_CHEZMOI" != "success" ] || \
             [ "$RESULT_FISH" != "success" ] || \
             [ "$RESULT_BATS" != "success" ]; then
            echo ""
            echo "Some checks failed. Please review the logs above."
            exit 1
          fi

          echo ""
          echo "All CI checks passed!"
