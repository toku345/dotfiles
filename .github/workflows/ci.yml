name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  shellcheck:
    name: ShellCheck Lint
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run ShellCheck on shell scripts
        run: |
          echo "=== ShellCheck Analysis ==="

          FAILED=0
          FOUND=0

          # Use process substitution to avoid word splitting on filenames
          while IFS= read -r script; do
            [ -z "$script" ] && continue

            if echo "$script" | grep -q '\.tmpl$'; then
              FOUND=1
              echo ""
              echo "Checking: $script"
              # Strip Go template syntax before checking
              # Replace {{ ... }} with PLACEHOLDER to avoid parse errors
              sed 's/{{[^}]*}}/PLACEHOLDER/g' "$script" | \
                shellcheck --severity=warning - || FAILED=1
              continue
            fi

            # The chezmoi `executable_` prefix sets mode 0755 on deploy
            # but does not imply a shell interpreter — executables may be
            # Node, Python, etc.
            # Filter by shebang so non-shell executables don't fail with
            # SC1127 / SC1011 / SC1083 noise. The regex covers bash/sh/
            # dash/ksh/zsh either as a direct interpreter (#!/bin/bash)
            # or via env (#!/usr/bin/env bash), with or without args.
            shebang=$(head -n1 "$script" 2>/dev/null || true)
            if ! [[ "$shebang" =~ ^#!.*[[:space:]/](bash|sh|dash|ksh|zsh)([[:space:]]|$) ]]; then
              echo "Skipping non-shell script: $script"
              continue
            fi

            FOUND=1
            echo ""
            echo "Checking: $script"
            shellcheck --severity=warning "$script" || FAILED=1
          done < <(find .chezmoiscripts dot_local/bin dot_git-template/hooks tests/bats/bin .claude/hooks \
              -type f \( -name "*.sh" -o -name "*.sh.tmpl" -o -name "executable_*" -o -name "fzf" -o -name "ghostty" -o -name "gh" \) \
              2>/dev/null)

          if [ $FOUND -eq 0 ]; then
            echo "No shell scripts found"
            exit 0
          fi

          echo ""
          if [ $FAILED -eq 1 ]; then
            echo "ERROR: ShellCheck found issues in one or more scripts"
            exit 1
          fi

          echo "OK: All scripts passed ShellCheck"

  chezmoi-validate:
    name: Chezmoi Validation
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install chezmoi
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin
          echo "Installed chezmoi version:"
          chezmoi --version

      - name: Validate template syntax
        run: |
          echo "=== Template Syntax Validation ==="

          FAILED=0
          FOUND=0

          # Use process substitution to avoid word splitting on filenames
          while IFS= read -r tmpl; do
            [ -z "$tmpl" ] && continue
            FOUND=1
            echo "Validating: $tmpl"

            # .chezmoi.toml.tmpl uses init-time functions (promptBoolOnce etc.)
            # that require --init flag to be available in execute-template
            if [ "$(basename "$tmpl")" = ".chezmoi.toml.tmpl" ]; then
              EXEC_ARGS="--init"
            else
              EXEC_ARGS=""
            fi

            # --source .: resolve include() against the checkout, not the
            # runner's default ~/.local/share/chezmoi (empty on CI)
            if ! chezmoi --source . execute-template $EXEC_ARGS --file "$tmpl" > /dev/null 2>&1; then
              echo "ERROR: Invalid template syntax in $tmpl"
              chezmoi --source . execute-template $EXEC_ARGS --file "$tmpl" 2>&1 || true
              FAILED=1
            fi
          done < <(find . -name "*.tmpl" -type f 2>/dev/null)

          if [ $FOUND -eq 0 ]; then
            echo "No template files found"
            exit 0
          fi

          echo ""
          if [ $FAILED -eq 1 ]; then
            echo "ERROR: Template validation failed"
            exit 1
          fi

          echo "OK: All templates have valid syntax"

      - name: Run chezmoi doctor
        run: |
          echo "=== Chezmoi Doctor ==="
          chezmoi doctor --no-network || true

      - name: Verify chezmoi configuration
        run: |
          echo "=== Chezmoi Configuration Check ==="

          # Check that managed files can be listed (excluding encrypted)
          echo "Managed files (excluding encrypted):"
          chezmoi managed --include=files --exclude=encrypted 2>/dev/null || true

          echo ""
          echo "OK: Configuration appears valid"

  codex-pr-review-bundle:
    name: Codex pr-review Bundle
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          # verify_pr_review_bundle.py uses stdlib tomllib, available on Python 3.11+.
          python-version: "3.13"

      - name: Validate bundled Codex agents and licenses
        run: python3 tests/codex/verify_pr_review_bundle.py

      - name: Validate pr-review verifier fail-closed behavior
        run: python3 tests/codex/test_verify_pr_review_bundle_negative.py

      - name: Validate pr-review V2 scheduler abnormal paths
        run: python3 tests/codex/test_pr_review_v2_scheduler.py

  claude-pr-review-workflow:
    name: Claude pr-review Workflow Logic
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # The harness is ESM with top-level await and requires Node 20+; the
      # runner image's preinstalled Node is not guaranteed (apt nodejs ships
      # v18 on Ubuntu 24.04). Pinned to current Active LTS (Node 24).
      - name: Setup Node 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Run pr-review workflow logic tests
        run: node tests/claude/test_pr_review_workflow.mjs

  fish-syntax:
    name: Fish Syntax Check
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install fish shell
        run: |
          sudo apt-get update
          sudo apt-get install -y fish
          fish --version

      - name: Fish syntax check
        run: |
          echo "=== Fish Syntax Check ==="
          FAILED=0

          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "Checking: $f"
            fish -n "$f" || FAILED=1
          done < <(find private_dot_config/private_fish \
              -type f -name "*.fish" 2>/dev/null)

          if [ $FAILED -eq 1 ]; then
            echo "ERROR: fish syntax check failed"
            exit 1
          fi
          echo "OK: fish syntax check passed"

  bats-tests:
    name: Bats Tests
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install bats-core and fish
        run: |
          sudo apt-get update
          sudo apt-get install -y bats fish
          bats --version
          fish --version

      - name: Run bats test suite
        run: bats tests/bats/

  private-lima-calibration:
    name: Private Lima Calibration Unit Tests
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository with implementation base
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up pinned Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14.5"

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run calibration unit and negative tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python3 -m unittest discover -s tests/outer_loop_lima -p 'test_*.py'

      - name: Check guest provisioning shell
        run: |
          find tools/outer-loop-lima-calibration/guest \
            -type f -name '*.sh' \
            -exec shellcheck --severity=warning {} +

  private-lima-profiles:
    name: Private Lima Static Profiles
    runs-on: macos-15

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install and identify Lima
        run: |
          brew install lima
          test "$(limactl --version)" = "limactl version 2.1.4"

      - name: Validate static profiles without starting a VM
        run: |
          limactl validate --tty=false \
            tools/outer-loop-lima-calibration/profiles/week0-codex.yaml \
            tools/outer-loop-lima-calibration/profiles/week0-claude.yaml

  reusable-secret-scan:
    name: Reusable Secret Scan
    uses: ./.github/workflows/secret-scan.reusable.yml
    permissions:
      contents: read
