# Modifications from upstream:
#   - Template placeholders ({{TARGET_LABEL}}, {{USER_FOCUS}},
#     {{REVIEW_COLLECTION_GUIDANCE}}, {{REVIEW_INPUT}}) replaced with prose referring
#     to orchestrator-provided spawn context. Reason: this is a Codex CLI subagent
#     invoked via the parent skill's spawn_agent primitive; the placeholders were
#     designed for codex-companion.mjs runtime substitution and have no substitution
#     mechanism in this deployment.
#   - <structured_output_contract> adapted from JSON-schema-enforced output to
#     natural-markdown output. Reason: the original used the codex-companion.mjs
