# Managed baseline for Codex on this machine.
#
# Codex reads ~/.codex/config.toml. This file is kept separate so chezmoi can
# manage stable defaults without overwriting local state that Codex updates.
#
# Keep Codex's local-only sections (projects.*, mcp_servers.*, notice.*)
# in ~/.codex/config.toml. See docs/codex.md for the full guidance.

model = "gpt-5.5"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "xhigh"
personality = "pragmatic"
approvals_reviewer = "guardian_subagent"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
network_access = false

[features]
multi_agent = true
apps = true
guardian_approval = true

[plugins."github@openai-curated"]
enabled = true

[profiles.review]
model = "gpt-5.5"
model_reasoning_effort = "medium"
sandbox_mode = "workspace-write"

[profiles.review_deep]
model = "gpt-5.5"
model_reasoning_effort = "high"
sandbox_mode = "workspace-write"

[profiles.review_audit]
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
sandbox_mode = "workspace-write"

[tui]
status_line = [
  "model-with-reasoning",
  "current-dir",
  "git-branch",
  "context-remaining",
  "five-hour-limit",
  "codex-version",
]
