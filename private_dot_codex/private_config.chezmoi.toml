# Managed bootstrap defaults for Codex on this machine.
#
# Codex reads ~/.codex/config.toml. This file is kept separate so chezmoi can
# initialize stable defaults without overwriting local state that Codex updates.
#
# Keep these local-only settings in ~/.codex/config.toml:
# - model / model_reasoning_effort / plan_mode_reasoning_effort
# - [projects."..."]
# - [mcp_servers.*]
# - [notice.*]

personality = "pragmatic"
approvals_reviewer = "guardian_subagent"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
network_access = false

[features]
js_repl = true
guardian_approval = true

[plugins."github@openai-curated"]
enabled = true
